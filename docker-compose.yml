services:
  db:
    image: postgres:15
    container_name: benntek_db
    environment:
      POSTGRES_USER: benntek
      POSTGRES_PASSWORD: benntek
      POSTGRES_DB: benntek_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: benntek_api
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
