version: "3.9"

services:
  db:
    image: postgres:15
    container_name: benntek_db
    restart: always
    environment:
      POSTGRES_USER: benntek
      POSTGRES_PASSWORD: benntek
      POSTGRES_DB: benntek_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: benntek_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
